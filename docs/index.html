<style>
:root{--green:#0e6939;--green-light:#e8f5ee;--green-dark:#094d29;--red:#e02020;--navy:#1a2744;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6f9;color:#222;font-size:14px;}

.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a2744 0%,#094d29 100%);}
.auth-card{background:#fff;border-radius:16px;padding:44px 38px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.auth-logo{text-align:center;margin-bottom:28px;}
.auth-logo h1{font-size:19px;color:var(--green);font-weight:700;margin-top:10px;}
.auth-logo p{font-size:12px;color:#888;margin-top:3px;}
.auth-card label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;margin-top:16px;}
.auth-card input{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;transition:border .2s;}
.auth-card input:focus{outline:none;border-color:var(--green);}
.btn-login{width:100%;background:var(--green);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:22px;transition:background .2s;}
.btn-login:hover{background:var(--green-dark);}
.auth-err{background:#fee;color:var(--red);border-radius:6px;padding:10px 12px;font-size:13px;margin-top:12px;}
.app{display:flex;min-height:100vh;}
.sidebar{width:218px;background:var(--navy);color:#fff;flex-shrink:0;display:flex;flex-direction:column;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo .brand{font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px;}
.sidebar-logo .sub{font-size:9px;color:rgba(255,255,255,.45);margin-top:2px;}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);padding:14px 16px 5px;text-transform:uppercase;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(14,105,57,.3);color:#fff;border-left-color:var(--green);}
.sidebar-bottom{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.1);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;}
.user-name{font-size:12px;font-weight:600;color:#fff;}
.user-role{font-size:10px;color:rgba(255,255,255,.45);}
.btn-logout{font-size:11px;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;margin-top:5px;padding:0;}
.btn-logout:hover{color:#fff;}
.main{flex:1;overflow:auto;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:13px 26px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar h2{font-size:17px;font-weight:700;color:var(--navy);}
.topbar .meta{font-size:11px;color:#999;margin-top:1px;}
.page{padding:22px 26px;flex:1;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:#fff;border-radius:10px;padding:18px;border:1px solid #e5e7eb;border-top:4px solid var(--green);}
.stat-card .lbl{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;}
.stat-card .val{font-size:26px;font-weight:700;color:var(--navy);margin-top:5px;}
.stat-card .sub{font-size:11px;color:#aaa;margin-top:1px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--green);color:#fff;} .btn-primary:hover{background:var(--green-dark);}
.btn-secondary{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;} .btn-secondary:hover{background:#e5e7eb;}
.btn-danger{background:#fee2e2;color:#dc2626;} .btn-danger:hover{background:#fecaca;}
.btn-sm{padding:5px 11px;font-size:12px;}
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:18px;}
.card-header{padding:14px 18px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;}
.card-header h3{font-size:14px;font-weight:700;color:var(--navy);}
table{width:100%;border-collapse:collapse;}
th{background:#f9fafb;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;text-align:left;border-bottom:1px solid #e5e7eb;}
td{padding:11px 14px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-draft{background:#f3f4f6;color:#6b7280;} .badge-issued{background:#dbeafe;color:#1d4ed8;}
.badge-accepted{background:#d1fae5;color:#065f46;} .badge-completed{background:#dcfce7;color:var(--green);}
.badge-void{background:#fee2e2;color:#dc2626;}
.badge-qt{background:#fef3c7;color:#92400e;} .badge-jc{background:#ede9fe;color:#5b21b6;} .badge-sdn{background:#e0f2fe;color:#0369a1;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.c3{grid-template-columns:1fr 1fr 1fr;}
.fc{grid-column:1/-1;}
.field label{display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;transition:border .2s;background:#fff;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(14,105,57,.08);}
.field textarea{resize:vertical;min-height:70px;}
.sec-div{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.8px;padding:10px 0 7px;border-bottom:2px solid var(--green-light);margin:6px 0 14px;grid-column:1/-1;}
.boq-wrap{overflow-x:auto;margin-bottom:6px;}
.boq-table{width:100%;border-collapse:collapse;min-width:520px;}
.boq-table th{background:var(--green);color:#fff;padding:7px 8px;font-size:11px;text-align:left;font-weight:600;}
.boq-table td{padding:4px 3px;border-bottom:1px solid #f0f0f0;}
.boq-table td input{border:1px solid #e5e7eb;border-radius:4px;padding:5px 7px;width:100%;font-size:12px;background:#fff;}
.boq-table td input:focus{outline:none;border-color:var(--green);}
.boq-amt{text-align:right;font-weight:600;font-size:12px;color:var(--navy);padding-right:6px;}
.boq-totals{background:#f9fafb;border:1px solid #e5e7eb;border-radius:7px;padding:10px 14px;margin-top:6px;max-width:340px;margin-left:auto;}
.tot-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;}
.tot-row.grand{font-weight:700;font-size:15px;color:var(--green);border-top:2px solid var(--green-light);margin-top:5px;padding-top:7px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:860px;box-shadow:0 24px 80px rgba(0,0,0,.25);margin:auto;}
.modal-hdr{padding:18px 22px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;background:var(--navy);border-radius:14px 14px 0 0;}
.modal-hdr h3{color:#fff;font-size:15px;font-weight:700;}
.modal-x{background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer;line-height:1;padding:0;}
.modal-x:hover{color:#fff;}
.modal-body{padding:22px;}
.modal-ftr{padding:14px 22px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:9px;background:#f9fafb;border-radius:0 0 14px 14px;}
.search-bar{display:flex;gap:9px;margin-bottom:18px;}
.search-bar input{flex:1;border:1.5px solid #e5e7eb;border-radius:7px;padding:8px 13px;font-size:13px;}
.search-bar input:focus{outline:none;border-color:var(--green);}
.search-bar select{border:1.5px solid #e5e7eb;border-radius:7px;padding:8px 11px;font-size:13px;background:#fff;cursor:pointer;}
.toast-container{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px;}
.toast{background:#1a2744;color:#fff;border-radius:7px;padding:11px 16px;font-size:13px;border-left:4px solid var(--green);box-shadow:0 4px 20px rgba(0,0,0,.2);animation:slideIn .3s ease;}
.toast.err{border-left-color:var(--red);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg);}}
.task-row{display:flex;gap:7px;margin-bottom:5px;align-items:center;}
.task-num{width:22px;text-align:center;font-size:11px;color:#888;flex-shrink:0;}
.task-input{flex:1;border:1.5px solid #e5e7eb;border-radius:6px;padding:6px 9px;font-size:13px;font-family:inherit;}
.task-input:focus{outline:none;border-color:var(--green);}
.task-del{border:none;background:#fee2e2;color:#dc2626;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:15px;flex-shrink:0;}
.qk-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px;border-radius:10px;cursor:pointer;border:1.5px solid;font-size:13px;font-weight:600;transition:all .15s;height:90px;}
@media(max-width:900px){.stats-grid{grid-template-columns:1fr 1fr;}.form-grid{grid-template-columns:1fr;}}
<\/style>
<script>
// Pre-Alpine session check — runs immediately before Alpine initializes
(function(){
  try {
    var s = localStorage.getItem("jot_s");
    if(s) {
      var p = JSON.parse(s);
      if(p && p.user && p.token) {
        // Hide login, show app immediately (Alpine will take over after init)
        document.addEventListener('DOMContentLoaded', function(){
          var login = document.getElementById('auth-wrap');
          var app = document.querySelector('.app');
          if(login) login.style.display = 'none';
          if(app) app.style.removeProperty('display');
        });
      }
    }
  } catch(e) {}
})();
</script>
</head>
<body x-data="app">

<div class="toast-container">
  <template x-for="t in toasts" :key="t.id">
    <div class="toast" :class="t.e?'err':''"><span x-text="t.m"></span></div>
  </template>
</div>

<!-- LOGIN -->
<div class="auth-wrap" id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="28" fill="#0e6939"/><text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="26" font-weight="bold" font-family="Arial,sans-serif">J</text></svg>
      <h1>Jero-One Technologies</h1>
      <p>Document Management System</p>
    </div>
    <label>Email Address</label>
    <input type="email" x-model="lEmail" placeholder="jerome.lutaya@gmail.com" @keyup.enter="doLogin()"/>
    <label>Password</label>
    <input type="password" x-model="lPass" placeholder="••••••••" @keyup.enter="doLogin()"/>
    <div class="auth-err" x-show="lErr" x-text="lErr"></div>
    <button class="btn-login" @click="doLogin()" :disabled="lLoading">
      <span x-show="!lLoading">Sign In</span>
      <span x-show="lLoading" class="spin"></span>
    </button>
  </div>
</div>

        <svg x-show="!saving" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span x-show="!saving">Save &amp; Print PDF</span><span x-show="saving" class="spin"></span>

<script>
const API="https://base44.app/api/apps/69fd345c00eead7ea202264c/functions/jotDocManager";
const PDF_API="https://base44.app/api/apps/69fd345c00eead7ea202264c/functions/generateJotPdf";
const LH_B64="";
const SIG_B64="";
const STAMP_B64="";

document.addEventListener('alpine:init', () => {
  Alpine.data('app', () => ({

  user:null,token:null,
  lEmail:"jerome.lutaya@gmail.com",lPass:"",lErr:"",lLoading:false,
  tab:"dash",stats:{},docs:[],filtered:[],
  srch:"",fStat:"",
  showF:false,fType:"quotation",eDoc:{},saving:false,
  boq:[],bSub:0,bTax:0,bTot:0,
  tasks:[],svcs:[],
  toasts:[],
  pdfLoading:{},

  init(){const s=localStorage.getItem("jot_s");if(s){try{const p=JSON.parse(s);if(p&&p.user&&p.token){this.user=p.user;this.token=p.token;setTimeout(()=>{try{this.loadStats();}catch(e){}try{this.loadDocs("");}catch(e){}},50);}}catch(e){localStorage.removeItem("jot_s");}}},

  async doLogin(){
    this.lErr="";this.lLoading=true;
    try{
      const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"login",email:this.lEmail,password:this.lPass})});
      const d=await r.json();
      if(d.error){this.lErr=d.error;}
      else{this.user=d.user;this.token=d.token;localStorage.setItem("jot_s",JSON.stringify({user:d.user,token:d.token}));this.loadStats();this.loadDocs("");}
    }catch(e){this.lErr="Connection error.";}
    this.lLoading=false;
  },

  doLogout(){localStorage.removeItem("jot_s");this.user=null;this.token=null;},

  async loadStats(){const r=await this.api({action:"stats",token:this.token});if(!r.error)this.stats=r;},

  async loadDocs(type){
    const r=await this.api({action:"list_docs",doc_type:type,token:this.token});
    if(!r.error){this.docs=r.docs;this.filtered=r.docs;}
  },

  doFilter(){
    let d=[...this.docs];
    if(this.srch)d=d.filter(x=>(x.serial_number||"").toLowerCase().includes(this.srch.toLowerCase())||(x.client_name||"").toLowerCase().includes(this.srch.toLowerCase()));
    if(this.fStat)d=d.filter(x=>x.status===this.fStat);
    this.filtered=d;
  },

  async openNew(){
    const t=this.tab==="qt"?"quotation":this.tab==="jc"?"job_card":this.tab==="sdn"?"service_delivery_note":"quotation";
    this.fType=t;
    const r=await this.api({action:"next_serial",doc_type:t,token:this.token});
    const today=new Date().toISOString().split("T")[0];
    this.eDoc={serial_number:r.serial,date:today,status:"draft",payment_terms:"50% advance on LPO, balance on completion. Valid for 30 days."};
    this.boq=[];this.tasks=[""];this.svcs=[""];this.calcBoq();this.showF=true;
  },

  doEdit(d){
    this.fType=d.doc_type;this.eDoc={...d};
    try{this.boq=JSON.parse(d.items_boq||"[]").map(r=>({desc:r.description||r.desc||"",unit:r.unit||"",qty:r.qty||0,up:r.unit_price||r.up||0,amt:r.amount||r.amt||0}));}catch{this.boq=[];}
    try{this.tasks=JSON.parse(d.scope_of_work||'[""]');}catch{this.tasks=[""];}
    try{this.svcs=JSON.parse(d.services_rendered||'[""]');}catch{this.svcs=[""];}
    this.calcBoq();this.showF=true;
  },

  calcBoq(){
    let sub=0;
    this.boq=this.boq.map(r=>{const a=(parseFloat(r.qty)||0)*(parseFloat(r.up)||0);sub+=a;return{...r,amt:a};});
    this.bSub=sub;this.bTax=Math.round(sub*0.18);this.bTot=sub+this.bTax;
  },

  async doSave(andPrint){
    if(!this.eDoc.client_name){this.toast("Client name is required.","e");return;}
    this.saving=true;
    const doc={...this.eDoc,doc_type:this.fType,
      items_boq:JSON.stringify(this.boq.map(r=>({description:r.desc,unit:r.unit,qty:r.qty,unit_price:r.up,amount:r.amt}))),
      scope_of_work:JSON.stringify(this.tasks.filter(t=>t)),
      services_rendered:JSON.stringify(this.svcs.filter(s=>s)),
    };
    const r=await this.api({action:"save_doc",doc,token:this.token});
    this.saving=false;
    if(r.error){this.toast(r.error,"e");return;}
    this.showF=false;this.toast("Saved: "+r.doc.serial_number);
    this.loadStats();this.loadDocs(this.fType==="quotation"?"quotation":this.fType==="job_card"?"job_card":"service_delivery_note");
    if(andPrint)setTimeout(()=>this.doPrint(r.doc),200);
  },

  async updStatus(d){await this.api({action:"update_status",doc_id:d.id,status:d.status,token:this.token});this.toast("Status → "+d.status);},

  async doDel(d){
    if(!confirm("Delete "+d.serial_number+"? Cannot be undone."))return;
    const r=await this.api({action:"delete_doc",doc_id:d.id,token:this.token});
    if(r.error){this.toast(r.error,"e");return;}
    this.docs=this.docs.filter(x=>x.id!==d.id);this.filtered=this.filtered.filter(x=>x.id!==d.id);
    this.loadStats();this.toast("Deleted: "+d.serial_number);
  },

  // ── PDF GENERATION ────────────────────────────────────────────────────────
  doPrint(d){
    this.toast("Generating PDF…");
    setTimeout(()=>{
      try{this._buildPDF(d);}
      catch(e){console.error(e);this.toast("PDF error: "+e.message,"e");}
    },50);
  },

  // ── SERVER-SIDE HQ PDF (uses master Python build script + corrected letterhead) ─
  async doServerPdf(d){
    if(this.pdfLoading[d.id]){return;}
    this.pdfLoading={...this.pdfLoading,[d.id]:true};
    this.toast("Generating high-quality PDF… please wait");
    try{
      // Build the data payload from the document fields
      let boq=[];try{boq=JSON.parse(d.items_boq||"[]");}catch{}
      let scopes=[];try{scopes=JSON.parse(d.scope_of_work||"[]");}catch{}
      let mats=[];try{mats=JSON.parse(d.materials_list||"[]");}catch{}
      let svcs=[];try{svcs=JSON.parse(d.services_rendered||"[]");}catch{}

      const data={
        serial: d.serial_number||"",
        date: d.date||new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}),
        client_name: d.client_name||"",
        branch: d.attn||"",
        contact: d.attn||"",
        phone: d.client_contact||"",
        location: d.location||"",
        service_type: d.service_description||"",
        technician: d.technician||"Tony Lutaaya",
        contact_nos: "+256 752 200 865 | +256 701 511 262",
        sign_date: d.date||"",
        // JC/SDN tasks
        tasks: scopes.length>0 ? scopes : (d.service_description?[d.service_description]:[]),
        materials: mats.length>0 ? mats : boq.map(b=>({desc:b.description||b.desc||"",qty:b.qty||"",unit:b.unit||"Pcs"})),
        // Quotation fields
        prepared_by: d.technician||"Tony Lutaaya",
        validity: "30 Days",
        valid_until: "",
        client_address: d.client_address||"",
        client_pobox: d.client_pobox||"",
        attn: d.attn||"",
        client_email: d.client_email||"",
        payment_terms: d.payment_terms||"50% advance, 50% on completion",
        currency: "Uganda Shillings (UGX)",
        currency_code: "UGX",
        delivery: "Ex Stock",
        subject: d.service_description||"",
        items: boq.map(b=>({desc:b.description||b.desc||"",uom:b.unit||"Piece",qty:parseFloat(b.qty)||0,unit_price:parseFloat(b.unit_price||b.up)||0})),
        // SDN fields
        jc_ref: d.serial_number||"",
        services: svcs.length>0 ? svcs : scopes.map(s=>({desc:s,status:"Completed"})),
      };

      const r=await fetch(PDF_API,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({token:this.token,doc_type:d.doc_type==="service_delivery_note"?"sdn":d.doc_type,data,doc_id:d.id})
      });
      const result=await r.json();
      if(result.error){this.toast("PDF error: "+result.error,"e");return;}
      // Open PDF in new tab
      window.open(result.url,"_blank");
      this.toast("✅ High-quality PDF ready!");
      // Update the doc record with the pdf_url
      if(result.url){
        await this.api({action:"save_doc",token:this.token,doc:{...d,pdf_url:result.url}});
        d.pdf_url=result.url;
      }
    }catch(e){
      console.error(e);
      this.toast("PDF generation failed: "+e.message,"e");
    }finally{
      const pl={...this.pdfLoading};delete pl[d.id];this.pdfLoading=pl;
    }
  },

  _buildPDF(d){
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:"portrait",unit:"pt",format:"a4"});
    const W=595.28,H=841.89,LM=44,TM=148,RM=44,CW=W-LM-RM;

    // ── LETTERHEAD BACKGROUND ─────────────────────────────────────────────
    pdf.addImage(LH_B64,"PNG",0,0,W,H);

    const G=[14,105,57],WH=[255,255,255],BK=[30,30,30];
    const setC=(...c)=>pdf.setTextColor(...c);
    const fmtN=n=>Math.round(n||0).toLocaleString();
    const today=d.date||new Date().toISOString().split("T")[0];

    // ── DOC TYPE TITLE ────────────────────────────────────────────────────
    let y=TM;
    const titles={quotation:"QUOTATION",job_card:"JOB CARD",service_delivery_note:"SERVICE DELIVERY NOTE"};
    pdf.setFontSize(17);pdf.setFont("helvetica","bold");setC(...G);
    pdf.text(titles[d.doc_type]||"DOCUMENT",W/2,y,{align:"center"});
    y+=8;
    pdf.setFontSize(8.5);pdf.setFont("helvetica","normal");setC(100,100,100);
    pdf.text("Ref: "+d.serial_number+"     Date: "+today+"     Status: "+(d.status||"draft").toUpperCase(),W/2,y,{align:"center"});
    y+=12;

    // ── HELPERS ───────────────────────────────────────────────────────────
    const banner=(title,yy)=>{
      pdf.setFillColor(...G);pdf.rect(LM,yy,CW,15,"F");
      pdf.setFontSize(8.5);pdf.setFont("helvetica","bold");setC(...WH);
      pdf.text(title,LM+5,yy+10.5);setC(...BK);return yy+19;
    };

    const twoCol=(l1,v1,l2,v2,yy)=>{
      const hw=CW/2-1,lw=hw*0.36,vw=hw*0.64;
      pdf.setFontSize(8);pdf.setFont("helvetica","bold");
      pdf.setFillColor(235,248,240);pdf.setDrawColor(200,200,200);pdf.setLineWidth(0.3);
      // left label
      pdf.rect(LM,yy,lw,13,"FD");setC(...G);pdf.text(l1,LM+3,yy+8.5);
      // left value
      pdf.setFillColor(255,255,255);pdf.rect(LM+lw,yy,vw,13,"FD");setC(...BK);
      pdf.setFont("helvetica","normal");
      const vt1=pdf.splitTextToSize(v1||"",vw-6);pdf.text(vt1[0]||"",LM+lw+3,yy+8.5);
      // right label
      pdf.setFillColor(235,248,240);pdf.setFont("helvetica","bold");
      pdf.rect(LM+hw+1,yy,lw,13,"FD");setC(...G);pdf.text(l2,LM+hw+1+3,yy+8.5);
      // right value
      pdf.setFillColor(255,255,255);pdf.rect(LM+hw+1+lw,yy,vw,13,"FD");setC(...BK);
      pdf.setFont("helvetica","normal");
      const vt2=pdf.splitTextToSize(v2||"",vw-6);pdf.text(vt2[0]||"",LM+hw+1+lw+3,yy+8.5);
      return yy+13;
    };

    const newPageIfNeeded=(yy,need=80)=>{
      if(yy+need>H-110){
        pdf.addPage();
        pdf.addImage(LH_B64,"PNG",0,0,W,H);
        return TM;
      }
      return yy;
    };

    // ── SECTION 1: CLIENT INFO ─────────────────────────────────────────────
    y=banner("1.  CLIENT DETAILS",y);
    y=twoCol("Serial No:",d.serial_number,"Date:",today,y);
    y=twoCol("Client:",d.client_name,"Attn:",d.attn,y);
    y=twoCol("Address:",d.client_address,"Phone:",d.client_contact,y);
    y=twoCol("Email:",d.client_email,"P.O. Box:",d.client_pobox,y);
    if(d.doc_type==="job_card"||d.doc_type==="service_delivery_note"){
      y=twoCol("Location:",d.location,"Technician:",d.technician,y);
    }
    y+=6;

    // ── SECTION 2: DESCRIPTION ─────────────────────────────────────────────
    y=newPageIfNeeded(y,60);
    y=banner("2.  SERVICE DESCRIPTION",y);
    const dLines=pdf.splitTextToSize(d.service_description||"(No description provided)",CW-8);
    const dH=dLines.length*10.5+10;
    pdf.setFillColor(252,255,253);pdf.setDrawColor(200,200,200);pdf.setLineWidth(0.3);
    pdf.rect(LM,y,CW,dH,"FD");
    pdf.setFontSize(8.5);pdf.setFont("helvetica","normal");setC(...BK);
    pdf.text(dLines,LM+4,y+8);
    y+=dH+6;

    // ── SECTION 3: BOQ ────────────────────────────────────────────────────
    let boqArr=[];
    try{boqArr=JSON.parse(d.items_boq||"[]");}catch{}
    if(boqArr.length>0&&(d.doc_type==="quotation"||d.doc_type==="job_card")){
      y=newPageIfNeeded(y,boqArr.length*14+60);
      y=banner("3.  BILL OF QUANTITIES",y);
      // Header
      const cw=[22,192,58,38,78,78];
      const ch=["#","Description","Unit","Qty","Unit Price (UGX)","Amount (UGX)"];
      let cx=LM;
      pdf.setFillColor(...G);pdf.setFontSize(8);pdf.setFont("helvetica","bold");setC(...WH);
      cw.forEach((w,i)=>{pdf.rect(cx,y,w,14,"F");pdf.text(ch[i],cx+(i>3?w-3:4),y+9.5,i>3?{align:"right"}:{});cx+=w;});
      y+=14;
      // Rows
      boqArr.forEach((row,ri)=>{
        const rh=13;
        if(ri%2===0)pdf.setFillColor(255,255,255);else pdf.setFillColor(235,248,240);
        cx=LM;pdf.setDrawColor(210,210,210);pdf.setLineWidth(0.3);pdf.setFont("helvetica","normal");setC(...BK);
        cw.forEach(w=>{pdf.rect(cx,y,w,rh,"FD");cx+=w;});
        cx=LM;
        pdf.setFontSize(8);
        pdf.text(String(ri+1),cx+cw[0]/2,y+8.5,{align:"center"});cx+=cw[0];
        const desc=pdf.splitTextToSize(row.description||row.desc||"",cw[1]-6);
        pdf.text(desc[0]||"",cx+3,y+8.5);cx+=cw[1];
        pdf.text(row.unit||"",cx+3,y+8.5);cx+=cw[2];
        pdf.text(String(row.qty||""),cx+3,y+8.5);cx+=cw[3];
        pdf.text(fmtN(row.unit_price||row.up||0),cx+cw[4]-3,y+8.5,{align:"right"});cx+=cw[4];
        pdf.text(fmtN(row.amount||row.amt||0),cx+cw[5]-3,y+8.5,{align:"right"});
        y+=rh;
      });
      // Totals
      const tc=LM+cw[0]+cw[1]+cw[2]+cw[3];const tw=cw[4]+cw[5];
      [[" Sub-Total (UGX)",fmtN(d.subtotal)],[" VAT / Tax (18%)",fmtN(d.tax)],["TOTAL (UGX)",fmtN(d.grand_total)]].forEach(([lbl,val],ti)=>{
        if(ti===2){pdf.setFillColor(...G);pdf.setLineWidth(1);pdf.setDrawColor(...G);pdf.setFont("helvetica","bold");setC(...WH);}
        else{pdf.setFillColor(235,248,240);pdf.setDrawColor(210,210,210);pdf.setLineWidth(0.3);pdf.setFont("helvetica","normal");setC(...BK);}
        pdf.rect(tc,y,tw,13,"FD");pdf.setFontSize(8.5);
        pdf.text(lbl,tc+4,y+8.5);pdf.text(val,tc+tw-3,y+8.5,{align:"right"});y+=13;
      });
      y+=6;
    }

    // ── SECTION: SCOPE OF WORK (JC) ───────────────────────────────────────
    let scopes=[];
    try{scopes=JSON.parse(d.scope_of_work||"[]");}catch{}
    if(d.doc_type==="job_card"&&scopes.length>0){
      y=newPageIfNeeded(y,scopes.length*16+40);
      y=banner("3.  SCOPE OF WORK",y);
      scopes.forEach((t,i)=>{
        const lines=pdf.splitTextToSize((i+1)+".  "+(t||""),CW-10);
        const rh=lines.length*10.5+7;
        if(i%2===0)pdf.setFillColor(255,255,255);else pdf.setFillColor(235,248,240);
        pdf.setDrawColor(210,210,210);pdf.setLineWidth(0.3);
        pdf.rect(LM,y,CW,rh,"FD");
        pdf.setFontSize(8.5);pdf.setFont("helvetica","normal");setC(...BK);
        pdf.text(lines,LM+5,y+8);y+=rh;
      });
      y+=6;
    }

    // ── SECTION: SERVICES RENDERED (SDN) ──────────────────────────────────
    let svcs=[];
    try{svcs=JSON.parse(d.services_rendered||"[]");}catch{}
    if(d.doc_type==="service_delivery_note"&&svcs.length>0){
      y=newPageIfNeeded(y,svcs.length*16+40);
      y=banner("3.  SERVICES RENDERED",y);
      svcs.forEach((s,i)=>{
        const lines=pdf.splitTextToSize((i+1)+".  "+(s||""),CW-75);
        const rh=Math.max(lines.length*10.5+7,18);
        if(i%2===0)pdf.setFillColor(255,255,255);else pdf.setFillColor(235,248,240);
        pdf.setDrawColor(210,210,210);pdf.setLineWidth(0.3);pdf.rect(LM,y,CW,rh,"FD");
        pdf.setFontSize(8.5);pdf.setFont("helvetica","normal");setC(...BK);
        pdf.text(lines,LM+5,y+8);
        // Status pill
        pdf.setFillColor(209,250,229);pdf.rect(LM+CW-68,y+4,64,11,"F");
        pdf.setFont("helvetica","bold");pdf.setTextColor(6,95,70);pdf.setFontSize(8);
        pdf.text("✓ Completed",LM+CW-36,y+10.5,{align:"center"});
        setC(...BK);y+=rh;
      });
      y+=6;
    }

    // ── SECTION: PAYMENT TERMS (QT) ───────────────────────────────────────
    if(d.doc_type==="quotation"&&d.payment_terms){
      y=newPageIfNeeded(y,50);
      y=banner("4.  PAYMENT TERMS",y);
      const tl=pdf.splitTextToSize(d.payment_terms,CW-8);
      const th=tl.length*10.5+10;
      pdf.setFillColor(252,255,253);pdf.setDrawColor(200,200,200);pdf.setLineWidth(0.3);pdf.rect(LM,y,CW,th,"FD");
      pdf.setFontSize(8.5);pdf.setFont("helvetica","normal");setC(...BK);pdf.text(tl,LM+4,y+8);
      y+=th+6;
    }

    // ── SECTION: BANK DETAILS (QT) ────────────────────────────────────────
    if(d.doc_type==="quotation"){
      y=newPageIfNeeded(y,70);
      y=banner("5.  BANK DETAILS FOR PAYMENT",y);
      y=twoCol("Bank:","Tropical Bank Ltd","Branch:","Kampala Road Branch",y);
      y=twoCol("Account Name:","Jero-One Technologies Ltd","Account No.","2001896841",y);
      y=twoCol("Swift / BIC:","TROAUGKA","Country:","Uganda",y);
      y+=6;
    }

    // ── CLIENT FEEDBACK (SDN) ─────────────────────────────────────────────
    if(d.doc_type==="service_delivery_note"&&d.client_feedback){
      y=newPageIfNeeded(y,40);
      y=banner("4.  CLIENT FEEDBACK",y);
      y=twoCol("Overall Rating:",d.client_feedback,"","",y);
      y+=6;
    }

    // ── SIGN-OFF ──────────────────────────────────────────────────────────
    y=newPageIfNeeded(y,100);
    const secN=d.doc_type==="quotation"?"6":d.doc_type==="service_delivery_note"&&d.client_feedback?"5":"4";
    y=banner(secN+".  AUTHORISATION & SIGN-OFF",y);
    const sh=62,sf=(CW-1)/2;
    // Sub-headers
    pdf.setFillColor(...G);pdf.rect(LM,y,sf,13,"F");pdf.rect(LM+sf+1,y,sf,13,"F");
    pdf.setFontSize(8);pdf.setFont("helvetica","bold");setC(...WH);
    pdf.text("FOR: JERO-ONE TECHNOLOGIES LTD",LM+4,y+9);
    pdf.text("CLIENT ACKNOWLEDGEMENT",LM+sf+1+4,y+9);
    y+=13;
    // Boxes
    pdf.setFillColor(248,255,251);pdf.setDrawColor(180,180,180);pdf.setLineWidth(0.4);
    pdf.rect(LM,y,sf,sh,"FD");pdf.rect(LM+sf+1,y,sf,sh,"FD");
    pdf.setFontSize(8.5);pdf.setFont("helvetica","normal");setC(80,80,80);
    const provName=d.doc_type==="quotation"?"Tony Lutaaya":"Jerome Gerald Lutaaya";
    const provTitle=d.doc_type==="quotation"?"Sr. Infrastructure Support Engineer":"Director";
    pdf.text("Signed:",LM+5,y+14);
    pdf.text("Signed:",LM+sf+6,y+14);
    pdf.text("Name:   "+provName,LM+5,y+28);pdf.text("Name:   ___________________________",LM+sf+6,y+28);
    pdf.text("Title:    "+provTitle,LM+5,y+40);pdf.text("Title:    ___________________________",LM+sf+6,y+40);
    pdf.text("Date:    "+today,LM+5,y+52);pdf.text("Date:    ___________________________",LM+sf+6,y+52);
    // Signature image (left box)
    try{pdf.addImage(SIG_B64,"PNG",LM+5,y+2,70,20);}catch{}
    // Stamp image (right of sig)
    try{pdf.addImage(STAMP_B64,"PNG",LM+80,y-2,55,28);}catch{}
    y+=sh+6;

    // ── Save ──────────────────────────────────────────────────────────────
    const fn=(d.serial_number||"doc").replace(/\//g,"-")+"_"+(d.client_name||"").replace(/\s+/g,"_")+".pdf";
    pdf.save(fn);
    this.toast("PDF downloaded: "+fn);
  },

  pgTitle(){const m={dash:"Dashboard",qt:"Quotations",jc:"Job Cards",sdn:"Service Delivery Notes",all:"All Documents"};return m[this.tab]||"Documents";},
  newLbl(){const m={qt:"Quotation",jc:"Job Card",sdn:"Delivery Note",all:"Document"};return m[this.tab]||"Document";},
  typeLabel(t){const m={quotation:"Quotation",job_card:"Job Card",service_delivery_note:"Service Delivery Note"};return m[t]||t;},
  typeShort(t){const m={quotation:"QT",job_card:"JC",service_delivery_note:"SDN"};return m[t]||t;},
  typeBadge(t){const m={quotation:"badge-qt",job_card:"badge-jc",service_delivery_note:"badge-sdn"};return m[t]||"";},
  fmtN(n){return Math.round(n||0).toLocaleString();},
  todayStr(){return new Date().toLocaleDateString("en-UG",{weekday:"long",year:"numeric",month:"long",day:"numeric"});},
  toast(m,e=""){const id=Date.now();this.toasts.push({id,m,e:e==="e"});setTimeout(()=>{this.toasts=this.toasts.filter(t=>t.id!==id);},3500);},
  }));
});
</script>
